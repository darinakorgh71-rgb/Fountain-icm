<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fountain World</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#070b18;font-family:Arial,sans-serif;color:#fff}
    canvas{display:block}
    .hud,.panel{position:fixed;z-index:10;background:rgba(8,12,28,.8);backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.13);border-radius:18px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
    .hud{left:16px;top:16px;max-width:340px}.panel{right:16px;top:16px;width:250px}
    h1{margin:0 0 8px;font-size:23px}p{color:#c1cbe0;line-height:1.45}
    button{border:0;border-radius:12px;padding:11px 15px;margin:4px 6px 4px 0;
      background:linear-gradient(135deg,#9b5cff,#e1b85b);color:#080b14;font-weight:800;cursor:pointer}
    button.secondary{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.15)}
    .stat{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08)}
    .tip{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:10;
      background:rgba(8,12,28,.84);border:1px solid rgba(255,255,255,.13);
      padding:10px 15px;border-radius:999px;color:#cbd5e8;font-size:13px;text-align:center}
    .modal{position:fixed;inset:0;z-index:30;display:none;place-items:center;background:rgba(0,0,0,.68)}
    .modal.show{display:grid}.modal-card{width:min(460px,90%);background:#111a31;border-radius:20px;padding:22px;border:1px solid rgba(255,255,255,.13)}
    .close{float:right;background:none;color:#fff;font-size:24px;padding:0}
    #errorBox{color:#ff9aa5;font-size:13px;white-space:pre-wrap}
    @media(max-width:760px){.panel{display:none}.hud{max-width:calc(100% - 32px)}.tip{width:calc(100% - 36px);border-radius:14px}}
  </style>
</head>
<body>
  <div class="hud">
    <h1>⛲ Fountain World</h1>
    <p>Перетягуй мишу для огляду. Колесо — наближення. Натискай на будівлі.</p>
    <button id="walletBtn">Підключити MetaMask</button>
    <button id="resetBtn" class="secondary">Початковий вид</button>
    <p id="walletStatus">Гаманець не підключено</p>
    <div id="errorBox"></div>
  </div>

  <div class="panel">
    <div class="stat"><span>Мережа</span><b>Sepolia</b></div>
    <div class="stat"><span>Токен</span><b>FNT</b></div>
    <div class="stat"><span>Баланс</span><b id="balance">—</b></div>
    <div class="stat"><span>Локація</span><b>Central Fountain</b></div>
  </div>

  <div class="tip">Миша: обертання · колесо: масштаб · клік: локація</div>

  <div class="modal" id="modal">
    <div class="modal-card">
      <button class="close" id="closeModal">×</button>
      <h2 id="modalTitle">Локація</h2>
      <p id="modalText"></p>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js";
    import { BrowserProvider, Contract, formatUnits } from "https://cdn.jsdelivr.net/npm/ethers@6.13.4/+esm";

    const errorBox = document.getElementById("errorBox");

    try {
      const CONTRACT_ADDRESS="0x40b9b3e6ab22603ffd90f35d3adbaac416a8953b";
      const SEPOLIA_CHAIN_ID="0xaa36a7";
      const ABI=[
        "function balanceOf(address) view returns (uint256)",
        "function decimals() view returns (uint8)",
        "function symbol() view returns (string)"
      ];

      const scene=new THREE.Scene();
      scene.background=new THREE.Color(0x080b18);
      scene.fog=new THREE.Fog(0x080b18,35,120);

      const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.1,300);
      const renderer=new THREE.WebGLRenderer({antialias:true});
      renderer.setSize(innerWidth,innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio,2));
      renderer.shadowMap.enabled=true;
      document.body.prepend(renderer.domElement);

      scene.add(new THREE.HemisphereLight(0x9b82ff,0x10152a,2));
      const light=new THREE.DirectionalLight(0xffffff,2);
      light.position.set(20,30,10);light.castShadow=true;scene.add(light);

      const ground=new THREE.Mesh(
        new THREE.CircleGeometry(60,96),
        new THREE.MeshStandardMaterial({color:0x10172c,roughness:.95})
      );
      ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);

      const plaza=new THREE.Mesh(
        new THREE.CircleGeometry(15,64),
        new THREE.MeshStandardMaterial({color:0x1a2240,roughness:.8})
      );
      plaza.rotation.x=-Math.PI/2;plaza.position.y=.02;scene.add(plaza);

      const fountain=new THREE.Group();
      const base=new THREE.Mesh(new THREE.CylinderGeometry(4.3,4.8,1,64),
        new THREE.MeshStandardMaterial({color:0x3a2a5f,metalness:.4,roughness:.35}));
      base.position.y=.5;fountain.add(base);
      const basin=new THREE.Mesh(new THREE.CylinderGeometry(3.5,3.8,.45,64),
        new THREE.MeshStandardMaterial({color:0x5d36a6,metalness:.35,roughness:.25}));
      basin.position.y=1.1;fountain.add(basin);
      const water=new THREE.Mesh(new THREE.CylinderGeometry(3.1,3.1,.12,64),
        new THREE.MeshStandardMaterial({color:0x7d6cff,emissive:0x24145d,transparent:true,opacity:.86}));
      water.position.y=1.36;fountain.add(water);
      const stem=new THREE.Mesh(new THREE.CylinderGeometry(.55,.8,3.2,32),
        new THREE.MeshStandardMaterial({color:0xe1b85b,metalness:.75,roughness:.22}));
      stem.position.y=2.7;fountain.add(stem);
      const orb=new THREE.Mesh(new THREE.SphereGeometry(.85,32,32),
        new THREE.MeshStandardMaterial({color:0xb87cff,emissive:0x3d176f,emissiveIntensity:1}));
      orb.position.y=4.5;fountain.add(orb);
      scene.add(fountain);

      const clickable=[];
      function addBuilding(x,z,w,h,d,color,title,text){
        const g=new THREE.Group();
        const body=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),
          new THREE.MeshStandardMaterial({color,roughness:.7}));
        body.position.y=h/2;body.castShadow=true;g.add(body);
        const roof=new THREE.Mesh(new THREE.ConeGeometry(Math.max(w,d)*.75,1.8,4),
          new THREE.MeshStandardMaterial({color:0xe1b85b,metalness:.5}));
        roof.position.y=h+.9;roof.rotation.y=Math.PI/4;g.add(roof);
        g.position.set(x,0,z);g.userData={title,text};scene.add(g);clickable.push(g);
      }

      addBuilding(-12,-8,5,7,5,0x233f67,"Gallery of Memory","Галерея цифрового мистецтва, спогадів і сюрреалістичних образів.");
      addBuilding(12,-7,5,6,5,0x4a2c63,"Fountain Café","Віртуальне кафе для цифрових подій і предметів.");
      addBuilding(-13,10,6,8,5,0x274d46,"Creators House","Простір художників, дизайнерів та авторів.");
      addBuilding(13,10,6,9,5,0x493f70,"World Library","Бібліотека історій, персонажів і документації Fountain.");

      for(let i=0;i<24;i++){
        const a=i/24*Math.PI*2;
        const lamp=new THREE.PointLight(0x9b5cff,1.5,8);
        lamp.position.set(Math.cos(a)*10,1.3,Math.sin(a)*10);scene.add(lamp);
      }

      let yaw=0,pitch=-.18,distance=27;
      let dragging=false,lastX=0,lastY=0,moved=false;

      function updateCamera(){
        const cp=Math.cos(pitch),sp=Math.sin(pitch);
        camera.position.set(Math.sin(yaw)*cp*distance,7+sp*distance,Math.cos(yaw)*cp*distance);
        camera.lookAt(0,2.5,0);
      }
      updateCamera();

      renderer.domElement.addEventListener("pointerdown",e=>{
        dragging=true;moved=false;lastX=e.clientX;lastY=e.clientY;
      });
      addEventListener("pointerup",()=>dragging=false);
      addEventListener("pointermove",e=>{
        if(!dragging)return;
        const dx=e.clientX-lastX,dy=e.clientY-lastY;
        if(Math.abs(dx)+Math.abs(dy)>3)moved=true;
        yaw-=dx*.006;pitch-=dy*.004;
        pitch=Math.max(-.75,Math.min(.45,pitch));
        lastX=e.clientX;lastY=e.clientY;updateCamera();
      });
      renderer.domElement.addEventListener("wheel",e=>{
        distance=Math.max(12,Math.min(55,distance+e.deltaY*.02));updateCamera();
      },{passive:true});

      document.getElementById("resetBtn").addEventListener("click",()=>{
        yaw=0;pitch=-.18;distance=27;updateCamera();
      });

      const raycaster=new THREE.Raycaster();
      const mouse=new THREE.Vector2();
      renderer.domElement.addEventListener("click",e=>{
        if(moved)return;
        mouse.x=(e.clientX/innerWidth)*2-1;
        mouse.y=-(e.clientY/innerHeight)*2+1;
        raycaster.setFromCamera(mouse,camera);
        const hits=raycaster.intersectObjects(clickable,true);
        if(!hits.length)return;
        let obj=hits[0].object;
        while(obj.parent&&!obj.userData.title)obj=obj.parent;
        if(obj.userData.title){
          document.getElementById("modalTitle").textContent=obj.userData.title;
          document.getElementById("modalText").textContent=obj.userData.text;
          document.getElementById("modal").classList.add("show");
        }
      });

      document.getElementById("closeModal").addEventListener("click",()=>{
        document.getElementById("modal").classList.remove("show");
      });
      document.getElementById("modal").addEventListener("click",e=>{
        if(e.target.id==="modal")e.currentTarget.classList.remove("show");
      });

      async function connectWallet(){
        const status=document.getElementById("walletStatus");
        try{
          if(!window.ethereum){status.textContent="MetaMask не знайдено";return;}
          const chainId=await window.ethereum.request({method:"eth_chainId"});
          if(chainId!==SEPOLIA_CHAIN_ID){
            await window.ethereum.request({
              method:"wallet_switchEthereumChain",
              params:[{chainId:SEPOLIA_CHAIN_ID}]
            });
          }
          const accounts=await window.ethereum.request({method:"eth_requestAccounts"});
          const provider=new BrowserProvider(window.ethereum);
          const contract=new Contract(CONTRACT_ADDRESS,ABI,provider);
          const [raw,decimals,symbol]=await Promise.all([
            contract.balanceOf(accounts[0]),contract.decimals(),contract.symbol()
          ]);
          document.getElementById("balance").textContent=
            Number(formatUnits(raw,decimals)).toLocaleString("uk-UA")+" "+symbol;
          status.textContent="Підключено: "+accounts[0].slice(0,6)+"…"+accounts[0].slice(-4);
        }catch(err){
          console.error(err);status.textContent="Помилка підключення MetaMask";
        }
      }

      document.getElementById("walletBtn").addEventListener("click",connectWallet);

      function animate(){
        requestAnimationFrame(animate);
        fountain.rotation.y+=.0015;
        orb.position.y=4.5+Math.sin(performance.now()*.002)*.15;
        renderer.render(scene,camera);
      }
      animate();

      addEventListener("resize",()=>{
        camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
        renderer.setSize(innerWidth,innerHeight);
      });
    } catch(err) {
      errorBox.textContent="Помилка запуску: "+err.message;
      console.error(err);
    }
  </script>
</body>
</html>
